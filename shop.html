<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Bayy Premium Silver Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(180deg, #1c1c1e, #2a2a2d);
        color: #e5e5e5;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: "Playfair Display", serif;
        color: #f5f5f5;
      }

      .navbar {
        background: linear-gradient(90deg, #2f2f33, #3c3c40);
      }

      .hero {
        min-height: 100vh;
        background: radial-gradient(circle at top, #2f2f33, #1c1c1e 70%);
        display: flex;
        align-items: center;
      }

      .card {
        background: linear-gradient(180deg, #2b2b2f, #1f1f22);
        border: none;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        transition: 0.4s;
      }
      .card:hover {
        transform: translateY(-8px) scale(1.03);
      }

      .card-body {
        color: #ddd;
      }

      .img-cinematic {
        filter: blur(6px) brightness(0.85);
        transform: scale(1.1);
        transition: all 1.4s cubic-bezier(0.19, 1, 0.22, 1);
      }
      .img-cinematic.aos-animate {
        filter: blur(0) brightness(1);
        transform: scale(1);
      }

      .btn-primary {
        background: linear-gradient(45deg, #bfc3c7, #e6e6e6);
        color: #111;
        border: none;
      }
      .btn-success {
        background: linear-gradient(45deg, #8d8f94, #cfd2d6);
        color: #111;
        border: none;
      }

      .wa-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(45deg, #bfc3c7, #f5f5f5);
        color: #111;
        padding: 14px 18px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        z-index: 9999;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        transition: all 0.3s ease;
      }

      .wa-float.small {
        padding: 10px 12px;
        border-radius: 50%;
        font-size: 14px;
        transition: 0.3s;
      }

      .wa-float.small span {
        display: none;
      }

      .offcanvas {
        background: linear-gradient(180deg, #2b2b2f, #1f1f22);
        color: #ddd;
      }

      .card p {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .btn.active {
        background: #fff;
        color: #000;
      }

      footer {
        background: #121214;
        color: #aaa;
        padding: 40px 0;
      }

      /* === TAMBAHAN POPUP === */
      .modal img {
        border-radius: 12px;
      }

      .modal h5 {
        margin-top: 10px;
      }

      .modal p {
        font-size: 14px;
        opacity: 0.9;
      }

      .product-section {
        min-height: 100vh;
      }

      .bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
        filter: brightness(0.5) blur(2px);
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 2;
      }

      .product-section .container {
        z-index: 3;
      }

      .card {
        background: rgba(40, 40, 45, 0.8);
        backdrop-filter: blur(10px);
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);

        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);

        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);

        transition: all 0.4s ease;
      }

      .card:hover {
        transform: translateY(-6px) scale(1.02);

        box-shadow:
          0 12px 40px rgba(0, 0, 0, 0.6),
          0 0 20px rgba(255, 255, 255, 0.08);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 18px;
        pointer-events: none;

        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.15),
          transparent
        );

        opacity: 0;
        transition: 0.5s;
      }

      .card:hover::before {
        opacity: 1;
      }

      .card-body {
        color: #f1f1f1;
      }
    </style>
  </head>
  <body>
    <script>
      const STORE_NAME = "BayyStore Premium";
      const WA_ADMIN = "6287849458134"; // GANTI NOMOR WA KAMU
    </script>

    <nav class="navbar navbar-expand-lg fixed-top navbar-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">◆ BayyStore Premium Silver</a>
        <button class="btn btn-light" onclick="toggleCart()">
          🛒 <span id="cartCount">0</span>
        </button>
      </div>
    </nav>

    <section class="product-section position-relative overflow-hidden">
      <!-- VIDEO BACKGROUND -->
      <video autoplay muted loop playsinline class="bg-video">
        <source src="bg1.mp4" type="video/mp4" />
      </video>

      <!-- OVERLAY -->
      <div class="overlay"></div>

      <div class="container position-relative my-5">
        <h2 class="text-center mb-4" data-aos="fade-up">Our Products</h2>

        <!-- 🔍 SEARCH + FILTER DI SINI -->
        <div class="text-center mb-3">
          <input
            id="search"
            class="form-control mb-2"
            placeholder="Cari produk..."
            onkeyup="renderProducts()"
          />

          <button class="btn btn-sm btn-light" onclick="filterCategory('All')">
            All
          </button>
          <button
            class="btn btn-sm btn-light"
            onclick="filterCategory('Pakaian')"
          >
            Pakaian
          </button>
          <button
            class="btn btn-sm btn-light"
            onclick="filterCategory('Sepatu')"
          >
            Sepatu
          </button>
          <button class="btn btn-sm btn-light" onclick="filterCategory('Tas')">
            Tas
          </button>
          <button
            class="btn btn-sm btn-light"
            onclick="filterCategory('Aksesoris')"
          >
            Aksesoris
          </button>
        </div>

        <!-- PRODUK -->
        <div class="row g-3" id="products"></div>
      </div>
    </section>

    <!-- CART -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartBox">
      <div class="offcanvas-header">
        <h5>🛒 Keranjang</h5>
        <button
          class="btn-close btn-close-white"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>
      <div class="offcanvas-body d-flex flex-column">
        <div id="cartItems" class="flex-grow-1"></div>
        <div>
          <p>Total: <b id="total">Rp 0</b></p>
          <input id="nama" class="form-control mb-2" placeholder="Nama" />
          <input id="alamat" class="form-control mb-2" placeholder="Alamat" />
          <button class="btn btn-success w-100" onclick="checkout()">
            Checkout via WhatsApp
          </button>
        </div>
      </div>
    </div>

    <div class="wa-float" id="waBtn" onclick="openWA()">
      💬 <span>Chat WA</span>
    </div>

    <footer class="text-center">
      <p>© 2026 BayyStore Premium Silver</p>
    </footer>

    <!-- === POPUP SHOPEE STYLE === -->
    <div class="modal fade" id="productModal">
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content p-3"
          style="background: #1f1f22; color: #fff; border-radius: 16px"
        >
          <div id="modalContent"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
      AOS.init({
        duration: 1400,
        easing: "cubic-bezier(.19,1,.22,1)",
        once: true,
        offset: 120,
      });

      const products = [
        {
          id: 1,
          name: "Sneakers Premium",
          price: 250000,
          oldPrice: 300000,
          stock: 5,
          img: "sepatu.jpg",
          desc: "Sepatu stylish nyaman dipakai harian.",
          category: "Sepatu",
          badge: "SALE",
        },
        {
          id: 2,
          name: "Kaos Silver",
          price: 90000,
          stock: 10,
          img: "baju.jpg",
          desc: "Kaos bahan adem dan tidak mudah luntur.",
          category: "Pakaian",
          badge: "BEST",
        },
        {
          id: 3,
          name: "Hoodie Elite",
          price: 190000,
          stock: 4,
          img: "Hoodie.jpg",
          desc: "Hoodie hangat dengan desain modern.",
          category: "Pakaian",
        },
        {
          id: 4,
          name: "Tas",
          price: 230000,
          stock: 6,
          img: "tas.jpg",
          desc: "Tas kuat dan cocok untuk aktivitas harian.",
          category: "Tas",
        },

        {
          id: 5,
          name: "Topi Street",
          price: 50000,
          stock: 8,
          img: "topi_street.jpg",
          desc: "Topi keren untuk gaya streetwear.",
          category: "Aksesoris",
        },
        {
          id: 6,
          name: "Celana Jeans",
          price: 180000,
          stock: 3,
          img: "celana_jeans.jpg",
          desc: "Jeans premium nyaman dan tahan lama.",
          category: "Pakaian",
          badge: "BEST",
        },
        {
          id: 7,
          name: "Jaket Varsity",
          price: 270000,
          stock: 2,
          img: "jaket_varsity.jpg",
          desc: "Jaket varsity dengan tampilan eksklusif.",
          category: "Pakaian",
        },
        {
          id: 8,
          name: "Kemeja Formal",
          price: 150000,
          stock: 7,
          img: "kemeja_formal.jpg",
          desc: "Kemeja rapi cocok untuk acara formal.",
          category: "Pakaian",
        },

        {
          id: 9,
          name: "Sandal Casual",
          price: 70000,
          stock: 9,
          img: "sandal_casual.jpg",
          desc: "Sandal santai ringan dan nyaman.",
          category: "Sepatu",
        },
        {
          id: 10,
          name: "Sepatu Sport",
          price: 300000,
          oldPrice: 350000,
          stock: 5,
          img: "sepatu_sport.jpg",
          desc: "Sepatu olahraga dengan grip kuat.",
          category: "Sepatu",
          badge: "SALE",
        },
        {
          id: 11,
          name: "Jam Tangan",
          price: 120000,
          stock: 6,
          img: "jam_tangan.jpg",
          desc: "Jam stylish untuk menunjang penampilan.",
          category: "Aksesoris",
        },
        {
          id: 12,
          name: "Dompet Kulit",
          price: 85000,
          stock: 10,
          img: "dompet_kulit.jpg",
          desc: "Dompet elegan berbahan kulit sintetis.",
          category: "Aksesoris",
        },

        {
          id: 13,
          name: "Kacamata Hitam",
          price: 95000,
          stock: 7,
          img: "kacamata_hitam.jpg",
          desc: "Kacamata anti UV dengan desain keren.",
          category: "Aksesoris",
        },
        {
          id: 14,
          name: "Ikat Pinggang",
          price: 60000,
          stock: 12,
          img: "ikat_pinggang.jpg",
          desc: "Belt kuat dan fleksibel digunakan.",
          category: "Aksesoris",
        },
        {
          id: 15,
          name: "Tas Ransel",
          price: 210000,
          stock: 5,
          img: "tas_ransel.jpg",
          desc: "Ransel besar cocok untuk sekolah/travel.",
          category: "Tas",
        },
        {
          id: 16,
          name: "Kaos Oversize",
          price: 110000,
          stock: 8,
          img: "kaos_oversize.jpg",
          desc: "Kaos oversize trend masa kini.",
          category: "Pakaian",
        },

        {
          id: 17,
          name: "Hoodie Zipper",
          price: 200000,
          stock: 4,
          img: "hoodie_zipper.jpg",
          desc: "Hoodie zipper praktis dan stylish.",
          category: "Pakaian",
          badge: "BEST",
        },
        {
          id: 18,
          name: "Sepatu Formal",
          price: 320000,
          stock: 3,
          img: "sepatu_formal.jpg",
          desc: "Sepatu formal elegan untuk kerja.",
          category: "Sepatu",
        },
        {
          id: 19,
          name: "Sendal Jepit Premium",
          price: 45000,
          stock: 15,
          img: "sendal_jepit_premium.jpg",
          desc: "Sandal jepit nyaman kualitas premium.",
          category: "Sepatu",
        },
        {
          id: 20,
          name: "Tas Selempang",
          price: 140000,
          stock: 6,
          img: "tas_selempang.jpg",
          desc: "Tas kecil praktis untuk sehari-hari.",
          category: "Tas",
        },
      ];

      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const productsEl = document.getElementById("products");
      const cartEl = document.getElementById("cartItems");
      const cartCount = document.getElementById("cartCount");
      const totalEl = document.getElementById("total");
      const cartBox = new bootstrap.Offcanvas("#cartBox");

      function rupiah(n) {
        return "Rp " + n.toLocaleString("id-ID");
      }

      function renderProducts() {
        productsEl.innerHTML = "";

        const keyword =
          document.getElementById("search")?.value?.toLowerCase() || "";

        products
          .filter(
            (p) => currentCategory === "All" || p.category === currentCategory,
          )
          .filter((p) => p.name.toLowerCase().includes(keyword))
          .forEach((p) => {
            productsEl.innerHTML += `
  <div class="col-6 col-md-3">
<div class="card h-100 position-relative">

${
  cart && cart.length > 0 && cart.find((item) => item.id === p.id)
    ? `
  <div style="
    position:absolute;
    top:10px;
    right:10px;
    background:#00ffc3;
    color:#000;
    font-weight:bold;
    width:28px;
    height:28px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    box-shadow:0 0 12px rgba(0,255,200,0.8);
    z-index:10;
  ">
    ✓
  </div>
`
    : ""
}

    ${p.badge ? `<span style="position:absolute;top:10px;left:10px;background:#fff;color:#000;padding:3px 8px;border-radius:6px;font-size:10px">${p.badge}</span>` : ""}

    <img src="${p.img}" class="card-img-top" style="cursor:pointer" onclick="openProduct(${p.id})">

    <div class="card-body text-center">
     <h6>${p.name}</h6>
     <small style="opacity:.6">${p.category}</small>
     <p style="font-size:13px;opacity:.8">${p.desc}</p>

     ${p.oldPrice ? `<span style="text-decoration:line-through;font-size:12px">${rupiah(p.oldPrice)}</span>` : ""}
     <p class="fw-bold">${rupiah(p.price)}</p>

     <small>Stok: ${p.stock}</small>

     <button class="btn btn-sm btn-primary w-100 mb-1" ${p.stock <= 0 ? "disabled" : ""} onclick="addToCart(${p.id})">Tambah</button>
     <button class="btn btn-sm btn-success w-100" onclick="orderSingle(${p.id})">Order WA</button>
    </div>

   </div>
  </div>`;
          });
      }

      function addToCart(id) {
        let p = products.find((x) => x.id === id);
        let i = cart.find((x) => x.id === id);
        if (i) i.qty++;
        else cart.push({ ...p, qty: 1, checked: true });
        save();
      }

      function toggleCheck(index) {
        cart[index].checked = !cart[index].checked;
        save();
      }

      function renderCart() {
        cartEl.innerHTML = "";
        let t = 0;

        cart.forEach((i, idx) => {
          // ✅ HANYA YANG DICENTANG MASUK TOTAL
          if (i.checked) {
            t += i.price * i.qty;
          }

          cartEl.innerHTML += `
<div class="d-flex align-items-center mb-3 p-2 rounded" style="background:#2a2a2d">

  <div onclick="toggleCheck(${idx})" style="
    width:26px;
    height:26px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    cursor:pointer;
    margin-right:10px;
    background:${i.checked ? "#00ffc3" : "#444"};
    color:${i.checked ? "#000" : "#888"};
  ">
    ${i.checked ? "✓" : ""}
  </div>

  <img src="${i.img}" style="
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:10px;
    margin-right:10px;
  ">

  <div class="flex-grow-1">
    <div style="font-size:14px">${i.name}</div>
    <small>${rupiah(i.price)} x ${i.qty}</small>
    <div class="fw-bold">${rupiah(i.price * i.qty)}</div>
  </div>

  <div class="d-flex flex-column gap-1">
    <button class="btn btn-sm btn-outline-success" onclick="qty(${idx},1)">+</button>
    <button class="btn btn-sm btn-outline-danger" onclick="qty(${idx},-1)">−</button>
  </div>

</div>
`;
        });

        cartCount.textContent = cart.reduce((a, b) => a + b.qty, 0);
        totalEl.textContent = rupiah(t);
      }

      function qty(i, n) {
        cart[i].qty += n;
        if (cart[i].qty <= 0) cart.splice(i, 1);
        save();
      }
      function save() {
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
        renderProducts(); // 🔥 WAJIB supaya badge update
      }
      function toggleCart() {
        cartBox.toggle();
      }

      function generateWAMessage(single = null) {
        let msg = `*🛍 ${STORE_NAME}*\nORDER BARU\n${new Date().toLocaleString("id-ID")}\n\n`;
        msg += `Nama: ${nama.value || "-"}\nAlamat: ${alamat.value || "-"}\n\nDetail:\n`;
        let total = 0;
        if (single) {
          msg += `- ${single.name} x1 = ${rupiah(single.price)}\n`;
          total = single.price;
        } else {
          const selectedItems = cart.filter((i) => i.checked === true);

          selectedItems.forEach((i) => {
            msg += `- ${i.name} x${i.qty} = ${rupiah(i.price * i.qty)}\n`;
            total += i.price * i.qty;
          });
        }

        msg += `\n*TOTAL: ${rupiah(total)}*`;
        return msg;
      }

      function checkout() {
        if (!nama.value || !alamat.value) {
          alert("Lengkapi data!");
          return;
        }

        if (!cart.some((i) => i.checked)) {
          alert("Pilih produk dulu!");
          return;
        }

        if (cart.length === 0) {
          alert("Keranjang kosong!");
          return;
        }
        const url = `https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(generateWAMessage())}`;
        window.open(url, "_blank");
        cart = [];
        save();
        cartBox.hide();
      }

      function orderSingle(id) {
        const p = products.find((x) => x.id === id);
        const url = `https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(generateWAMessage(p))}`;
        window.open(url, "_blank");
      }

      function openWA() {
        const url = `https://wa.me/${WA_ADMIN}?text=${encodeURIComponent("Halo " + STORE_NAME + ", saya ingin bertanya.")}`;
        window.open(url, "_blank");
      }

      let currentCategory = "All";

      function filterCategory(cat) {
        currentCategory = cat;

        document
          .querySelectorAll(".btn")
          .forEach((b) => b.classList.remove("active"));
        event.target.classList.add("active");

        renderProducts();
      }

      // === TAMBAHAN POPUP FUNCTION ===
      function openProduct(id) {
        const p = products.find((x) => x.id === id);

        document.getElementById("modalContent").innerHTML = `
  <img src="${p.img}" class="img-fluid mb-3">
  <h5>${p.name}</h5>
  <small>${p.category}</small>
  <p>${p.desc}</p>
  <b>${rupiah(p.price)}</b>
  <div class="mt-3">
    <button class="btn btn-primary w-100 mb-2" onclick="addToCart(${p.id})">Tambah ke Keranjang</button>
    <button class="btn btn-success w-100" onclick="orderSingle(${p.id})">Order via WhatsApp</button>
  </div>
 `;

        new bootstrap.Modal(document.getElementById("productModal")).show();
      }

      function scrollToProducts() {
        document.getElementById("products").scrollIntoView({
          behavior: "smooth",
        });
      }

      function scrollToProducts() {
        const el = document.getElementById("products");
        const y = el.getBoundingClientRect().top + window.pageYOffset - 70;
        window.scrollTo({ top: y, behavior: "smooth" });
      }

      function toggleCheck(index) {
        cart[index].checked = !cart[index].checked;
        save();
      }

      const waBtn = document.getElementById("waBtn");

      // mengecil setelah 4 detik
      setTimeout(() => {
        waBtn.classList.add("small");
      }, 4000);

      // balik normal kalau disentuh
      waBtn.addEventListener("mouseenter", () => {
        waBtn.classList.remove("small");
      });

      waBtn.addEventListener("click", () => {
        waBtn.classList.remove("small");
      });

      // mobile support (touch)
      waBtn.addEventListener("touchstart", () => {
        waBtn.classList.remove("small");
      });

      renderProducts();
      renderCart();
    </script>
  </body>
</html>
